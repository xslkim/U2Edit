# sample.yaml — 符合 requirements.md 3.2 Schema 的最小可用 project.yaml
# 用途：T1.2 YAML 读写测试、T1.7 画布渲染测试等

meta:
  name: "SampleProject"
  schemaVersion: 1
  canvasWidth: 1920
  canvasHeight: 1080

assets:
  - id: "btn_bg"
    path: "assets/btn_bg.png"
    width: 200
    height: 60

nodes:
  - id: "root_panel"
    name: "Root"
    type: panel
    x: 0
    y: 0
    width: 1920
    height: 1080
    pivot: topLeft
    visible: true
    opacity: 1.0
    background: null
    children:

      - id: "title_text"
        name: "Title"
        type: text
        x: 960
        y: 100
        width: 400
        height: 60
        pivot: topCenter
        visible: true
        opacity: 1.0
        content: "Sample UI"
        fontSize: 48
        color: "#FFFFFF"
        textAlign: center

      - id: "start_btn"
        name: "StartButton"
        type: button
        x: 960
        y: 400
        width: 200
        height: 60
        pivot: center
        visible: true
        opacity: 1.0
        background:
          assetId: "btn_bg"
          tint: "#FFFFFF"
        label:
          content: "Start"
          fontSize: 24
          color: "#000000"
          textAlign: center
        children: []

export:
  unity:
    assetRootPath: "Assets/UI/SampleProject"
    defaultFont: "Assets/Fonts/Default.asset"
    fontSizeScale: 1.0
    renderMode: "ScreenSpaceOverlay"
    referenceResolution: [1920, 1080]
    screenMatchMode: 0.5
  unreal:
    assetRootPath: "/Game/UI/SampleProject"
    defaultFont: "/Game/Fonts/Default"
    fontSizeScale: 1.0
